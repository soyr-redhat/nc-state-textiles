apiVersion: apps/v1
kind: Deployment
metadata:
  name: librechat
  labels:
    app: librechat
spec:
  replicas: 2  # Can scale based on workshop size
  selector:
    matchLabels:
      app: librechat
  template:
    metadata:
      labels:
        app: librechat
    spec:
      containers:
      - name: librechat
        image: ghcr.io/danny-avila/librechat:latest
        ports:
        - containerPort: 3080
          name: http
        env:
        # Basic Configuration
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "3080"
        - name: DOMAIN_SERVER
          value: "https://librechat-ai-workshop.apps.your-cluster.com"  # Update this
        - name: DOMAIN_CLIENT
          value: "https://librechat-ai-workshop.apps.your-cluster.com"  # Update this

        # MongoDB Connection (from secret)
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: librechat-secrets
              key: MONGO_URI

        # Security Keys (from secret)
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: librechat-secrets
              key: JWT_SECRET
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: librechat-secrets
              key: JWT_REFRESH_SECRET
        - name: CREDS_KEY
          valueFrom:
            secretKeyRef:
              name: librechat-secrets
              key: CREDS_KEY
        - name: CREDS_IV
          valueFrom:
            secretKeyRef:
              name: librechat-secrets
              key: CREDS_IV

        # Model API Configuration (from secret)
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: librechat-secrets
              key: OPENAI_API_KEY
        - name: OPENAI_API_BASE
          valueFrom:
            secretKeyRef:
              name: librechat-secrets
              key: OPENAI_API_BASE
              optional: true

        # Application Settings (from configmap)
        - name: APP_TITLE
          valueFrom:
            configMapKeyRef:
              name: librechat-config
              key: APP_TITLE
        - name: ALLOW_REGISTRATION
          valueFrom:
            configMapKeyRef:
              name: librechat-config
              key: ALLOW_REGISTRATION
        - name: FILE_UPLOAD_ENABLED
          valueFrom:
            configMapKeyRef:
              name: librechat-config
              key: FILE_UPLOAD_ENABLED
        - name: FILE_UPLOAD_SIZE_LIMIT
          valueFrom:
            configMapKeyRef:
              name: librechat-config
              key: FILE_UPLOAD_SIZE_LIMIT
        - name: IMAGE_VISION_ENABLED
          valueFrom:
            configMapKeyRef:
              name: librechat-config
              key: IMAGE_VISION_ENABLED
        - name: ENDPOINTS
          valueFrom:
            configMapKeyRef:
              name: librechat-config
              key: ENDPOINTS

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        volumeMounts:
        - name: uploads
          mountPath: /app/client/public/images
        - name: uploads
          mountPath: /app/api/uploads

        livenessProbe:
          httpGet:
            path: /api/health
            port: 3080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /api/health
            port: 3080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: uploads-pvc
